name: Deploy to Cloudflare Pages

on:
  push:
    branches: ['main']
  workflow_dispatch: {}

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Sanitize branch name for Pages (slashes become dashes)
        id: cf
        run: echo "branch=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=jakecuth --branch=${{ steps.cf.outputs.branch }}

      # Push every URL in sitemap.xml to IndexNow (Bing, Yandex, ChatGPT
      # search) so updates are crawled in minutes, not days. Only runs
      # on the main branch; key file is at /<key>.txt in the repo root.
      - name: Ping IndexNow
        if: github.ref == 'refs/heads/main'
        run: python3 notebooks/ping_indexnow.py
        continue-on-error: true
