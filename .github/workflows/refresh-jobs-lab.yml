name: Refresh AI & Jobs index

# Pulls the three peer-reviewed AI exposure datasets + BLS OEWS data via
# the BLS public API, rebuilds assets/data/jobs/occupations.json, and
# commits the result. Triggers a Pages redeploy via the existing
# deploy-pages.yml workflow on push.

on:
  schedule:
    # Run on the 5th of each month at 06:00 UTC
    - cron: '0 6 5 * *'
  workflow_dispatch: {}

concurrency:
  group: refresh-jobs-lab
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r notebooks/requirements/refresh-jobs.txt

      - name: Build the index
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python notebooks/jobs_lab.py

      - name: Commit refreshed index
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/jobs/occupations.json assets/data/jobs/methodology.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "jobs-lab: refresh BLS + exposure data ($STAMP) [auto]"
          git push
