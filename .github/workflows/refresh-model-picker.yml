name: Refresh Model Picker index

# Pulls the OpenRouter catalog, re-embeds, and commits the updated
# models.json + methodology.json. Triggers a Pages redeploy via the
# normal deploy-pages.yml on push.

on:
  schedule:
    # Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: {}

concurrency:
  group: refresh-model-picker
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build the index
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python notebooks/model_picker_lab.py

      - name: Commit refreshed index
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/model-picker/models.json assets/data/model-picker/methodology.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "model-picker: refresh index ($STAMP) [auto]"
          git push
