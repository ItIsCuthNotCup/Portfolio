name: Refresh Time-Use Atlas

# Pulls ATUS Table A-1 series via the BLS public API and rebuilds
# assets/data/time-use/cohorts.json. Triggers a Pages redeploy via the
# existing deploy-pages.yml workflow on push.

on:
  schedule:
    # Run on the 10th of each month at 06:00 UTC
    - cron: '0 6 10 * *'
  workflow_dispatch: {}

concurrency:
  group: refresh-time-use-lab
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build the time-use atlas
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python notebooks/time_use_lab.py

      - name: Commit refreshed data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/time-use/cohorts.json assets/data/time-use/methodology.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "time-use-lab: refresh ATUS pull ($STAMP) [auto]"
          git push
