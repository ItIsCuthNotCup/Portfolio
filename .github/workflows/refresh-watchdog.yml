name: Refresh Algorithm Watchdog

# Pulls YouTube Trending daily and commits the updated trending.json.
# Triggers a Pages redeploy via the existing deploy-pages.yml on push.

on:
  schedule:
    # 11:00 UTC = 7:00 AM EDT (Mar–Nov) / 6:00 AM EST (Nov–Mar) — after
    # US viewers have started their day but before the morning push lands.
    - cron: '0 11 * * *'
  workflow_dispatch: {}

concurrency:
  group: refresh-watchdog
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r notebooks/requirements/refresh-simple.txt

      - name: Pull YouTube Trending
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python notebooks/watchdog_lab.py

      - name: Commit refreshed data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/watchdog/trending.json assets/data/watchdog/methodology.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "watchdog: daily refresh ($STAMP) [auto]"
          git push
