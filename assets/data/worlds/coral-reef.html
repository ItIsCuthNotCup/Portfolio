<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coral Reef</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#063040; height:100%; }
  canvas { display:block; }
  .lbl {
    position:fixed; left:14px; bottom:12px;
    font-family: ui-monospace, "DM Mono", monospace; font-size:10px;
    letter-spacing:0.16em; text-transform:uppercase;
    color:rgba(220,250,255,0.55); pointer-events:none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="lbl">Coral reef · shallow tropical water</div>
<script>
'use strict';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a8aa0, 0.025);
scene.background = new THREE.Color(0x0a4858);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.5, 400);
camera.position.set(0, 6, 24);
camera.lookAt(0, 4, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Underwater lighting: cool ambient + warm sun shafts from above
scene.add(new THREE.AmbientLight(0x4a90b0, 0.7));
const sun = new THREE.DirectionalLight(0xfff0c0, 1.1);
sun.position.set(0, 30, 0);
scene.add(sun);
const sunBack = new THREE.DirectionalLight(0xa0e0ff, 0.4);
sunBack.position.set(10, 20, -15);
scene.add(sunBack);

// Sandy seafloor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120, 16, 16),
  new THREE.MeshStandardMaterial({ color: 0xc4b48a, roughness: 0.95, flatShading: true })
);
floor.rotation.x = -Math.PI/2;
// Ripple the sand
const fpos = floor.geometry.attributes.position;
for (let i = 0; i < fpos.count; i++) {
  const x = fpos.getX(i), y = fpos.getY(i);
  fpos.setZ(i, Math.sin(x*0.4)*0.3 + Math.cos(y*0.3)*0.4);
}
floor.geometry.computeVertexNormals();
scene.add(floor);

// Coral palette: tropical
const CORAL_COLORS = [0xff8a6a, 0xffb88a, 0xff5a9a, 0xa86acf, 0x7acfa8, 0xfff070, 0xff9c4a];

function makeBranchCoral(x, z, h, color) {
  const grp = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, flatShading: true });
  // Stack of irregular spheres climbing upward and branching
  let cy = 0;
  for (let i = 0; i < 6; i++) {
    const r = 0.5 - i * 0.05;
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 4), mat);
    sphere.position.set((Math.random()-0.5)*0.3, cy, (Math.random()-0.5)*0.3);
    grp.add(sphere);
    cy += r * 1.4;
  }
  // Side branches
  for (let b = 0; b < 3; b++) {
    const branch = new THREE.Mesh(new THREE.SphereGeometry(0.3, 6, 4), mat);
    branch.position.set((Math.random()-0.5)*1.4, 0.6 + Math.random()*1.5, (Math.random()-0.5)*1.4);
    grp.add(branch);
  }
  grp.position.set(x, 0, z);
  grp.scale.y = h / 2;
  return grp;
}

function makeBrainCoral(x, z, color) {
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, flatShading: true });
  const geo = new THREE.SphereGeometry(1.2, 10, 8);
  // squash and wobble
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
    const wobble = Math.sin(px*4) * Math.cos(pz*4) * 0.08;
    pos.setX(i, px + wobble);
    pos.setZ(i, pz + wobble);
  }
  geo.computeVertexNormals();
  const m = new THREE.Mesh(geo, mat);
  m.scale.y = 0.55;
  m.position.set(x, 0.5, z);
  return m;
}

// Scatter ~25 coral structures
for (let i = 0; i < 18; i++) {
  const x = (Math.random()-0.5) * 40;
  const z = (Math.random()-0.5) * 30;
  if (Math.abs(x) < 3 && Math.abs(z) < 3) continue;
  const color = CORAL_COLORS[Math.floor(Math.random() * CORAL_COLORS.length)];
  const h = 1.5 + Math.random() * 3;
  scene.add(makeBranchCoral(x, z, h, color));
}
for (let i = 0; i < 8; i++) {
  const x = (Math.random()-0.5) * 38;
  const z = (Math.random()-0.5) * 28;
  scene.add(makeBrainCoral(x, z, CORAL_COLORS[Math.floor(Math.random() * CORAL_COLORS.length)]));
}

// Low-poly fish drifting through
const fish = [];
function makeFish(color) {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.ConeGeometry(0.3, 1.2, 5),
    new THREE.MeshStandardMaterial({ color, roughness: 0.5, flatShading: true })
  );
  body.rotation.z = Math.PI/2;
  grp.add(body);
  // Tail
  const tail = new THREE.Mesh(
    new THREE.ConeGeometry(0.25, 0.5, 4),
    new THREE.MeshStandardMaterial({ color, roughness: 0.5 })
  );
  tail.rotation.z = -Math.PI/2;
  tail.position.x = -0.7;
  grp.add(tail);
  return grp;
}

const FISH_COLORS = [0xfff070, 0xff8a4a, 0x4ac4ff, 0xff5a8a, 0xffb060, 0x80f0a0];
for (let i = 0; i < 14; i++) {
  const f = makeFish(FISH_COLORS[i % FISH_COLORS.length]);
  f.position.set(
    (Math.random()-0.5) * 30,
    2 + Math.random() * 8,
    (Math.random()-0.5) * 25
  );
  fish.push({
    obj: f,
    speed: 0.04 + Math.random() * 0.04,
    sway: Math.random() * 6.28,
    yBase: f.position.y,
  });
  scene.add(f);
}

// Sun shafts overhead — 6 vertical translucent rectangles
for (let i = 0; i < 6; i++) {
  const shaft = new THREE.Mesh(
    new THREE.PlaneGeometry(2, 30),
    new THREE.MeshBasicMaterial({
      color: 0xa8e8ff, transparent: true, opacity: 0.06, side: THREE.DoubleSide,
    })
  );
  shaft.position.set((Math.random()-0.5)*30, 15, (Math.random()-0.5)*20);
  shaft.rotation.y = Math.random() * Math.PI;
  shaft.rotation.z = (Math.random()-0.5) * 0.15;
  scene.add(shaft);
}

// Bubbles drifting up
const bubbles = [];
for (let i = 0; i < 30; i++) {
  const b = new THREE.Mesh(
    new THREE.SphereGeometry(0.08 + Math.random()*0.15, 6, 4),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 })
  );
  b.position.set((Math.random()-0.5)*40, Math.random()*16, (Math.random()-0.5)*30);
  bubbles.push({ obj: b, speed: 0.03 + Math.random()*0.04, sway: Math.random()*6 });
  scene.add(b);
}

// Animate
let t = 0;
function animate() {
  t += 0.005;
  camera.position.x = Math.sin(t * 0.4) * 18;
  camera.position.z = Math.cos(t * 0.4) * 18 + 8;
  camera.position.y = 5 + Math.sin(t * 0.3) * 1.5;
  camera.lookAt(0, 3, 0);

  // Fish swim in slow loops
  for (const f of fish) {
    f.obj.position.x += f.speed;
    f.obj.position.y = f.yBase + Math.sin(t * 2 + f.sway) * 0.3;
    f.obj.rotation.y = Math.sin(t + f.sway) * 0.2;
    if (f.obj.position.x > 22) f.obj.position.x = -22;
  }

  // Bubbles rise
  for (const b of bubbles) {
    b.obj.position.y += b.speed;
    b.obj.position.x += Math.sin(t * 2 + b.sway) * 0.01;
    if (b.obj.position.y > 18) b.obj.position.y = 0;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
