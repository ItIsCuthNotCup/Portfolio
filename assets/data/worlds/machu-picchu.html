<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Machu Picchu at Sunset</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#1a1410; height:100%; }
  canvas { display:block; }
  .lbl {
    position:fixed; left:14px; bottom:12px;
    font-family: ui-monospace, "DM Mono", monospace; font-size:10px;
    letter-spacing:0.16em; text-transform:uppercase;
    color:rgba(245,235,210,0.55); pointer-events:none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="lbl">Machu Picchu · Inca citadel at sunset</div>
<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// Scene setup
// ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xb87a4f, 0.011);
scene.background = new THREE.Color(0x2a1a14);

const camera = new THREE.PerspectiveCamera(54, innerWidth/innerHeight, 0.3, 1000);
camera.position.set(0, 28, 70);
camera.lookAt(0, 8, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x2a1a14, 1);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─────────────────────────────────────────────────────────────
// Lighting: warm low sunset key + cool ambient + rim
// ─────────────────────────────────────────────────────────────
const sunDir = new THREE.DirectionalLight(0xffaa68, 1.6);
sunDir.position.set(-50, 22, 25);
scene.add(sunDir);

const ambient = new THREE.AmbientLight(0x6b5848, 0.55);
scene.add(ambient);

const rim = new THREE.DirectionalLight(0xffe0a8, 0.35);
rim.position.set(15, 12, -40);
scene.add(rim);

// Cool valley fill from below
const valleyFill = new THREE.HemisphereLight(0x4a3a2a, 0x1a1208, 0.4);
scene.add(valleyFill);

// ─────────────────────────────────────────────────────────────
// Sun disc + halo (always faces camera)
// ─────────────────────────────────────────────────────────────
const sunDisc = new THREE.Mesh(
  new THREE.CircleGeometry(8, 64),
  new THREE.MeshBasicMaterial({ color: 0xffd6a0, transparent: true, opacity: 0.92 })
);
sunDisc.position.set(-90, 30, -120);
scene.add(sunDisc);

const halo = new THREE.Mesh(
  new THREE.CircleGeometry(18, 48),
  new THREE.MeshBasicMaterial({ color: 0xff9c5a, transparent: true, opacity: 0.22 })
);
halo.position.copy(sunDisc.position);
halo.position.z -= 1;
scene.add(halo);

// Sun rays — radial spokes, faint
const raysGroup = new THREE.Group();
for (let i = 0; i < 12; i++) {
  const ray = new THREE.Mesh(
    new THREE.PlaneGeometry(2, 60),
    new THREE.MeshBasicMaterial({ color: 0xffc880, transparent: true, opacity: 0.06, side: THREE.DoubleSide })
  );
  ray.rotation.z = (i / 12) * Math.PI * 2;
  raysGroup.add(ray);
}
raysGroup.position.copy(sunDisc.position);
raysGroup.position.z -= 2;
scene.add(raysGroup);

// ─────────────────────────────────────────────────────────────
// Sky dome — warm to cool gradient via two hemispheres
// ─────────────────────────────────────────────────────────────
const skyGeo = new THREE.SphereGeometry(450, 24, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    topColor:    { value: new THREE.Color(0x4a2818) },
    bottomColor: { value: new THREE.Color(0xc8754a) },
    midColor:    { value: new THREE.Color(0x7a3818) },
  },
  vertexShader: `varying vec3 vWorldPos; void main() { vWorldPos = (modelMatrix * vec4(position,1.0)).xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `uniform vec3 topColor; uniform vec3 midColor; uniform vec3 bottomColor; varying vec3 vWorldPos; void main(){ float h = normalize(vWorldPos).y; vec3 c = mix(bottomColor, midColor, smoothstep(-0.1, 0.3, h)); c = mix(c, topColor, smoothstep(0.3, 0.9, h)); gl_FragColor = vec4(c, 1.0); }`,
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// ─────────────────────────────────────────────────────────────
// Material factory
// ─────────────────────────────────────────────────────────────
function stoneMat(tint, roughness = 0.95) {
  return new THREE.MeshStandardMaterial({
    color: tint, roughness, metalness: 0.0, flatShading: true,
  });
}

const matPeak    = stoneMat(0x5a3f2e);
const matGrass   = stoneMat(0x6e7547);
const matStone   = stoneMat(0xa89576);
const matMossy   = stoneMat(0x5a6849);
const matStoneL  = stoneMat(0xb59f7c);
const matStoneD  = stoneMat(0x9a8463);
const matThatch  = stoneMat(0x6b4a2a);
const matLlama   = stoneMat(0xe8d8b0);

// ─────────────────────────────────────────────────────────────
// Mountain peaks — craggy cones with vertex displacement
// ─────────────────────────────────────────────────────────────
function makePeak(x, y, z, height, baseR, color, segments = 6) {
  const peakGeo = new THREE.ConeGeometry(baseR, height, segments, 3);
  const pos = peakGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
    if (Math.abs(py) < height * 0.45) {
      const wobble = (Math.sin(i * 1.7) + Math.cos(i * 2.3)) * 0.6;
      pos.setX(i, px + wobble);
      pos.setZ(i, pz + wobble * 0.7);
    }
  }
  peakGeo.computeVertexNormals();
  const mesh = new THREE.Mesh(peakGeo, stoneMat(color));
  mesh.position.set(x, y, z);
  return mesh;
}

// Huayna Picchu — the iconic background peak
const huayna = makePeak(-2, 16, -32, 48, 18, 0x4a3326, 7);
scene.add(huayna);

// Peak ridge (15 supporting peaks fading into fog)
const peakConfigs = [
  [-44, 8, -55, 32, 16, 0x5b3f2e], [40, 4, -60, 28, 14, 0x553a2a],
  [-66, 0, -95, 38, 20, 0x4f3527], [62, -2, -105, 32, 18, 0x4a3122],
  [-22, 4, -78, 26, 12, 0x533824], [22, 8, -80, 30, 14, 0x583a28],
  [-90, -6, -130, 42, 22, 0x442e1f], [85, -4, -125, 36, 18, 0x402c1d],
  [-55, -8, -160, 44, 24, 0x3a261a], [50, -6, -150, 38, 20, 0x352318],
  [0, -10, -180, 48, 28, 0x301f15], [-110, -10, -110, 30, 16, 0x442f20],
  [105, -8, -115, 28, 14, 0x402d1e], [-35, -6, -120, 26, 12, 0x4a341f],
  [30, -4, -108, 24, 11, 0x523a25],
];
peakConfigs.forEach(c => scene.add(makePeak(...c)));

// ─────────────────────────────────────────────────────────────
// The terraced citadel — irregular concentric stepped rings
// ─────────────────────────────────────────────────────────────
const citadel = new THREE.Group();
scene.add(citadel);

function makeTerrace(innerR, outerR, height, yOffset, mat) {
  const shape = new THREE.Shape();
  const N = 24;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    const r = outerR + Math.sin(i * 1.3) * 0.7 + Math.cos(i * 2.1) * 0.3;
    const x = Math.cos(a) * r * 1.25;
    const z = Math.sin(a) * r;
    if (i === 0) shape.moveTo(x, z); else shape.lineTo(x, z);
  }
  shape.closePath();
  const hole = new THREE.Path();
  for (let i = 0; i < N; i++) {
    const a = -(i / N) * Math.PI * 2;
    const r = innerR + Math.sin(i * 1.7) * 0.4;
    const x = Math.cos(a) * r * 1.25;
    const z = Math.sin(a) * r;
    if (i === 0) hole.moveTo(x, z); else hole.lineTo(x, z);
  }
  hole.closePath();
  shape.holes.push(hole);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false, curveSegments: 1 });
  geo.rotateX(-Math.PI / 2);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = yOffset;
  return mesh;
}

// 9 stacked terraces with subtle palette shift (lower = greener, upper = drier)
const terrYStart = -2;
const terraceColors = [
  0x6e7547, 0x6c7344, 0x687041, 0x636a3a, 0x5d6235,
  0x575c30, 0x52582c, 0x4d5328, 0x484e24,
];
for (let i = 0; i < 9; i++) {
  const inner = 9 - i * 0.5;
  const outer = inner + 4;
  const y = terrYStart + i * 1.6;
  citadel.add(makeTerrace(inner, outer, 1.3, y, stoneMat(terraceColors[i])));
}

// Top plateau (wider, where buildings sit)
const topY = terrYStart + 9 * 1.6;
const topPlat = new THREE.Mesh(
  new THREE.CylinderGeometry(8.5, 8.5, 2.2, 18),
  stoneMat(0x7e6d52)
);
topPlat.scale.x = 1.25;
topPlat.position.y = topY + 1.1;
citadel.add(topPlat);

// ─────────────────────────────────────────────────────────────
// Inca buildings on the plateau
// ─────────────────────────────────────────────────────────────
function makeStoneHouse(w, d, h, color, hasRoof = false) {
  const grp = new THREE.Group();
  const wallMat = stoneMat(color);
  const t = 0.32;

  // Four walls
  const wallShapes = [
    [w, h, t, 0, h/2, -d/2],
    [w, h, t, 0, h/2,  d/2],
    [t, h, d, -w/2, h/2, 0],
    [t, h, d,  w/2, h/2, 0],
  ];
  for (const [ww, hh, dd, px, py, pz] of wallShapes) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(ww, hh, dd), wallMat);
    wall.position.set(px, py, pz);
    grp.add(wall);
  }

  // Doorway opening — small dark plane on front
  const door = new THREE.Mesh(
    new THREE.PlaneGeometry(0.45, 0.85),
    new THREE.MeshBasicMaterial({ color: 0x1a0e08 })
  );
  door.position.set(0, 0.45, d/2 + 0.01);
  grp.add(door);

  // Optional thatched roof (some Inca buildings had ichu grass roofs)
  if (hasRoof) {
    const roofGeo = new THREE.ConeGeometry(Math.max(w, d) * 0.78, 0.8, 4);
    const roof = new THREE.Mesh(roofGeo, stoneMat(0x6b4a2a));
    roof.rotation.y = Math.PI / 4;
    roof.position.y = h + 0.4;
    grp.add(roof);
  }

  return grp;
}

function placeStructure(g, x, z, rot, scale = 1) {
  g.position.set(x, topY + 2.2, z);
  g.rotation.y = rot;
  g.scale.setScalar(scale);
  citadel.add(g);
}

// ~15 buildings clustered as a small Inca settlement
const houseConfigs = [
  // [w, d, h, color, hasRoof, x, z, rot, scale]
  [2.6, 1.8, 1.5, 0xb09a78, false, -3.2, -1.4,  0.15, 1.0],
  [2.2, 2.2, 1.6, 0xa89377, true,  -1.0, -2.6, -0.05, 1.0],
  [3.0, 1.6, 1.4, 0xb59f7c, false,  1.4, -2.2,  0.22, 1.0],
  [2.4, 2.0, 1.7, 0xae9879, true,   3.6, -0.8, -0.10, 1.0],
  [2.8, 1.8, 1.5, 0xb39a76, false,  0.6,  1.6,  0.30, 1.0],
  [2.0, 2.4, 1.5, 0xa9947a, true,  -2.4,  2.0, -0.20, 1.0],
  [2.6, 1.6, 1.4, 0xae9573, false,  2.6,  2.4,  0.06, 1.0],
  [1.8, 1.8, 1.3, 0xb09077, true,  -4.8,  0.4, -0.05, 0.9],
  [2.2, 1.6, 1.4, 0xa68f74, false,  4.6, -2.6,  0.45, 0.9],
  [1.6, 2.0, 1.3, 0xb29a78, true,   4.4,  3.2,  0.10, 0.9],
  [2.0, 1.6, 1.5, 0xa68f72, false, -4.4, -2.8, -0.15, 0.9],
  [2.4, 1.4, 1.2, 0xb39c79, true,  -1.4,  4.2,  0.00, 0.9],
  [1.8, 1.4, 1.2, 0xae9577, false,  1.6,  4.0, -0.18, 0.85],
  [2.0, 1.8, 1.6, 0xa68f74, true,   0.0, -4.2,  0.10, 0.95],
  [1.6, 1.6, 1.2, 0xb09579, false, -3.6,  3.8,  0.25, 0.85],
];
for (const c of houseConfigs) {
  const [w, d, h, color, roof, x, z, rot, scale] = c;
  placeStructure(makeStoneHouse(w, d, h, color, roof), x, z, rot, scale);
}

// Intihuatana — the ceremonial sun stone at the center
const inti = new THREE.Group();
const intiBase = new THREE.Mesh(
  new THREE.BoxGeometry(1.0, 0.5, 1.0), stoneMat(0x5a4633)
);
intiBase.position.y = 0.25;
inti.add(intiBase);
const intiMid = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.4, 0.6), stoneMat(0x6b5440)
);
intiMid.position.y = 0.7;
inti.add(intiMid);
const intiTop = new THREE.Mesh(
  new THREE.BoxGeometry(0.4, 0.6, 0.4), stoneMat(0x7d6248)
);
intiTop.position.y = 1.2;
inti.add(intiTop);
inti.position.set(0, topY + 2.2, 0);
citadel.add(inti);

// Stairs leading up the side (single set, decorative)
function makeStairs(x, z, dir = 1) {
  const grp = new THREE.Group();
  for (let i = 0; i < 8; i++) {
    const step = new THREE.Mesh(
      new THREE.BoxGeometry(2.0, 0.3, 0.7),
      stoneMat(0xa89576)
    );
    step.position.set(0, i * 0.45, i * 0.7 * dir);
    grp.add(step);
  }
  grp.position.set(x, topY - 1.2, z);
  return grp;
}
citadel.add(makeStairs(-7, 0, 1));
citadel.add(makeStairs(7, 0, -1));

// ─────────────────────────────────────────────────────────────
// Llamas — small low-poly animals grazing on the terraces
// ─────────────────────────────────────────────────────────────
function makeLlama() {
  const grp = new THREE.Group();
  // body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 0.5, 0.4),
    matLlama
  );
  body.position.y = 0.55;
  grp.add(body);
  // neck
  const neck = new THREE.Mesh(
    new THREE.BoxGeometry(0.18, 0.55, 0.22),
    matLlama
  );
  neck.position.set(0.42, 0.85, 0);
  neck.rotation.z = -0.5;
  grp.add(neck);
  // head
  const head = new THREE.Mesh(
    new THREE.BoxGeometry(0.28, 0.22, 0.22),
    matLlama
  );
  head.position.set(0.7, 1.05, 0);
  grp.add(head);
  // 4 legs
  for (const [px, pz] of [[0.3, 0.15], [0.3, -0.15], [-0.3, 0.15], [-0.3, -0.15]]) {
    const leg = new THREE.Mesh(
      new THREE.BoxGeometry(0.12, 0.55, 0.12),
      matLlama
    );
    leg.position.set(px, 0.27, pz);
    grp.add(leg);
  }
  return grp;
}

const llamas = [];
const llamaSpots = [
  [-12, terrYStart + 4 * 1.6 + 1.3, 4, 0.3],
  [10, terrYStart + 3 * 1.6 + 1.3, 6, -0.6],
  [-8, terrYStart + 6 * 1.6 + 1.3, -3, 1.2],
  [6, terrYStart + 5 * 1.6 + 1.3, -7, 2.4],
  [14, terrYStart + 2 * 1.6 + 1.3, 0, -0.4],
];
for (const [x, y, z, rot] of llamaSpots) {
  const l = makeLlama();
  l.position.set(x, y, z);
  l.rotation.y = rot;
  llamas.push({ obj: l, baseY: y, sway: Math.random() * 6.28 });
  scene.add(l);
}

// ─────────────────────────────────────────────────────────────
// Distant valley + Urubamba river suggestion (dark plane)
// ─────────────────────────────────────────────────────────────
const valley = new THREE.Mesh(
  new THREE.PlaneGeometry(900, 900, 1, 1),
  stoneMat(0x382819)
);
valley.rotation.x = -Math.PI / 2;
valley.position.y = -22;
scene.add(valley);

// River (thin meandering plane, slightly reflective)
const river = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 4, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x3a4a5a, roughness: 0.4, metalness: 0.5 })
);
river.rotation.x = -Math.PI / 2;
river.rotation.z = 0.3;
river.position.set(-10, -21.9, -85);
scene.add(river);

// ─────────────────────────────────────────────────────────────
// Cloud bands drifting through the valley
// ─────────────────────────────────────────────────────────────
const clouds = [];
function makeCloud(x, y, z, size) {
  const grp = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xead4b8, transparent: true, opacity: 0.36 });
  const matInner = new THREE.MeshBasicMaterial({ color: 0xfff0d8, transparent: true, opacity: 0.5 });
  for (let i = 0; i < 7; i++) {
    const r = size * (0.6 + Math.random() * 0.9);
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(r, 7, 5),
      i % 3 === 0 ? matInner : mat
    );
    m.position.set(
      (Math.random() - 0.5) * size * 3.0,
      (Math.random() - 0.5) * size * 0.7,
      (Math.random() - 0.5) * size * 1.6,
    );
    grp.add(m);
  }
  grp.position.set(x, y, z);
  return grp;
}

for (let i = 0; i < 14; i++) {
  const c = makeCloud(
    (Math.random() - 0.5) * 160,
    -6 + Math.random() * 8,
    -25 - Math.random() * 110,
    3 + Math.random() * 4,
  );
  clouds.push({ obj: c, drift: 0.04 + Math.random() * 0.05 });
  scene.add(c);
}

// Higher altitude cirrus wisps (slower)
for (let i = 0; i < 6; i++) {
  const c = makeCloud(
    (Math.random() - 0.5) * 200,
    32 + Math.random() * 12,
    -40 - Math.random() * 80,
    4 + Math.random() * 3,
  );
  clouds.push({ obj: c, drift: 0.01 + Math.random() * 0.02 });
  scene.add(c);
}

// ─────────────────────────────────────────────────────────────
// Andean condors — silhouettes circling overhead
// ─────────────────────────────────────────────────────────────
function makeBird() {
  const grp = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0x1a0f08 });
  // V-shape for soaring bird silhouette
  const wL = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.06, 0.3), mat);
  wL.rotation.z = 0.18;
  wL.position.x = -1.2;
  grp.add(wL);
  const wR = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.06, 0.3), mat);
  wR.rotation.z = -0.18;
  wR.position.x = 1.2;
  grp.add(wR);
  return grp;
}
const birds = [];
for (let i = 0; i < 4; i++) {
  const b = makeBird();
  birds.push({
    obj: b,
    radius: 25 + Math.random() * 30,
    speed: 0.005 + Math.random() * 0.005,
    phase: Math.random() * 6.28,
    height: 28 + Math.random() * 10,
  });
  scene.add(b);
}

// ─────────────────────────────────────────────────────────────
// Atmospheric particles — dust motes in the warm light
// ─────────────────────────────────────────────────────────────
const particleGeo = new THREE.BufferGeometry();
const particleCount = 300;
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i*3]   = (Math.random() - 0.5) * 80;
  positions[i*3+1] = Math.random() * 40 - 5;
  positions[i*3+2] = (Math.random() - 0.5) * 80;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xffd6a0, size: 0.18, transparent: true, opacity: 0.45,
  sizeAttenuation: true,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─────────────────────────────────────────────────────────────
// Animation loop
// ─────────────────────────────────────────────────────────────
let t = 0;
function animate() {
  t += 0.0035;

  // Slow camera orbit — wider, more cinematic
  camera.position.x = Math.sin(t) * 48;
  camera.position.z = Math.cos(t) * 48 + 22;
  camera.position.y = 24 + Math.sin(t * 0.6) * 5;
  camera.lookAt(0, 8, 0);

  // Drift clouds
  for (const c of clouds) {
    c.obj.position.x += c.drift;
    if (c.obj.position.x > 100) c.obj.position.x = -100;
  }

  // Llamas: subtle bob + occasional head turn
  for (const l of llamas) {
    l.obj.position.y = l.baseY + Math.sin(t * 1.5 + l.sway) * 0.03;
  }

  // Birds: circular soaring paths
  for (const b of birds) {
    const a = t * b.speed * 50 + b.phase;
    b.obj.position.x = Math.cos(a) * b.radius;
    b.obj.position.z = Math.sin(a) * b.radius - 20;
    b.obj.position.y = b.height + Math.sin(a * 2) * 1.5;
    b.obj.rotation.y = -a + Math.PI/2;
    // gentle wing flap
    b.obj.children[0].rotation.z = 0.18 + Math.sin(t * 6 + b.phase) * 0.06;
    b.obj.children[1].rotation.z = -0.18 - Math.sin(t * 6 + b.phase) * 0.06;
  }

  // Particles drift slowly upward and reset
  const pos = particles.geometry.attributes.position;
  for (let i = 0; i < particleCount; i++) {
    pos.array[i*3 + 1] += 0.005;
    if (pos.array[i*3 + 1] > 35) pos.array[i*3 + 1] = -5;
  }
  pos.needsUpdate = true;

  // Sun + halo + rays always face camera
  sunDisc.lookAt(camera.position);
  halo.lookAt(camera.position);
  raysGroup.lookAt(camera.position);
  raysGroup.rotation.z = t * 0.05; // slow rotation of rays around sun

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
