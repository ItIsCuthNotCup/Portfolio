<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Machu Picchu at Sunset</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#1a1410; height:100%; }
  canvas { display:block; }
  .lbl {
    position:fixed; left:14px; bottom:12px;
    font-family: ui-monospace, "DM Mono", monospace; font-size:10px;
    letter-spacing:0.16em; text-transform:uppercase;
    color:rgba(245,235,210,0.55); pointer-events:none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="lbl">Machu Picchu · seed scene · low-poly</div>
<script>
'use strict';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xb87a4f, 0.012);
scene.background = new THREE.Color(0x2a1a14);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.5, 800);
camera.position.set(0, 26, 64);
camera.lookAt(0, 6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x2a1a14, 1);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Lighting: warm low sunset key light + cool ambient fill ───
const sun = new THREE.DirectionalLight(0xffb070, 1.4);
sun.position.set(-40, 22, 30);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6b5848, 0.55));
// rim light from behind to silhouette the peaks
const rim = new THREE.DirectionalLight(0xffe0a8, 0.35);
rim.position.set(15, 12, -40);
scene.add(rim);

// ─── Sun disc in the sky ───
const sunGeo = new THREE.CircleGeometry(7.5, 48);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffd6a0, transparent: true, opacity: 0.85 });
const sunDisc = new THREE.Mesh(sunGeo, sunMat);
sunDisc.position.set(-90, 30, -120);
scene.add(sunDisc);
// soft halo
const haloGeo = new THREE.CircleGeometry(14, 48);
const haloMat = new THREE.MeshBasicMaterial({ color: 0xff9c5a, transparent: true, opacity: 0.18 });
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.position.copy(sunDisc.position);
halo.position.z -= 1;
scene.add(halo);

// ─── Materials ───
function stoneMat(tint) {
  return new THREE.MeshStandardMaterial({
    color: tint, roughness: 0.95, metalness: 0.0, flatShading: true,
  });
}
const matPeak  = stoneMat(0x6b4f3a);
const matRock  = stoneMat(0x5d4232);
const matGrass = stoneMat(0x6e7547);
const matStone = stoneMat(0xa89576);
const matMossy = stoneMat(0x5a6849);
const matSky   = new THREE.MeshBasicMaterial({ color: 0x945d3a, side: THREE.BackSide });

// Sky dome (subtle warm gradient feel via dim solid)
const skyGeo = new THREE.SphereGeometry(380, 18, 12);
const sky = new THREE.Mesh(skyGeo, matSky);
scene.add(sky);

// ─── Huayna Picchu (the iconic background peak), low-poly cone-ish ───
function makePeak(x, y, z, height, baseR, color, segments) {
  const peakGeo = new THREE.ConeGeometry(baseR, height, segments || 5, 1);
  // displace vertices a little for a craggy silhouette
  const pos = peakGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
    const wobble = (Math.sin(i * 1.7) + Math.cos(i * 2.3)) * 0.5;
    pos.setX(i, px + wobble * 0.6);
    pos.setZ(i, pz + wobble * 0.4);
  }
  peakGeo.computeVertexNormals();
  const mesh = new THREE.Mesh(peakGeo, stoneMat(color));
  mesh.position.set(x, y, z);
  return mesh;
}

const huayna = makePeak(-2, 14, -28, 42, 16, 0x4a3326, 6);
scene.add(huayna);

// supporting peaks fading into fog
scene.add(makePeak(-40, 6, -50, 28, 14, 0x5b3f2e, 5));
scene.add(makePeak(36, 2, -56, 24, 13, 0x553a2a, 5));
scene.add(makePeak(-60, -2, -90, 32, 18, 0x4f3527, 5));
scene.add(makePeak(58, -4, -100, 28, 16, 0x4a3122, 5));

// ─── The terraced citadel platform ───
const citadel = new THREE.Group();
scene.add(citadel);

// terrace rings (concentric, descending) — the iconic stepped agricultural tiers
function makeTerrace(innerR, outerR, height, yOffset, mat) {
  const shape = new THREE.Shape();
  // outer perimeter — irregular polygon for organic terrace edge
  const N = 18;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    const r = outerR + Math.sin(i * 1.3) * 0.6;
    const x = Math.cos(a) * r * 1.2; // slight elongation
    const z = Math.sin(a) * r;
    if (i === 0) shape.moveTo(x, z); else shape.lineTo(x, z);
  }
  shape.closePath();
  // inner hole
  const hole = new THREE.Path();
  for (let i = 0; i < N; i++) {
    const a = -(i / N) * Math.PI * 2;
    const r = innerR + Math.sin(i * 1.7) * 0.4;
    const x = Math.cos(a) * r * 1.2;
    const z = Math.sin(a) * r;
    if (i === 0) hole.moveTo(x, z); else hole.lineTo(x, z);
  }
  hole.closePath();
  shape.holes.push(hole);

  const geo = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false, curveSegments: 1 });
  geo.rotateX(-Math.PI / 2);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = yOffset;
  return mesh;
}

// 6 stacked terraces + flat top
const terrYStart = -1;
const terraceColors = [0x6e7547, 0x68703f, 0x636a3a, 0x5d6235, 0x57592f, 0x52502a];
for (let i = 0; i < 6; i++) {
  const inner = 8 - i * 0.6;
  const outer = inner + 4;
  const y = terrYStart + i * 1.8;
  const m = stoneMat(terraceColors[i]);
  citadel.add(makeTerrace(inner, outer, 1.4, y, m));
}
// Flat top platform (where the structures sit)
const topPlat = new THREE.Mesh(
  new THREE.CylinderGeometry(8, 8, 2.4, 14),
  stoneMat(0x7e6d52)
);
topPlat.scale.x = 1.2;
topPlat.position.y = terrYStart + 6 * 1.8 + 1.2;
citadel.add(topPlat);

// ─── Stone structures on top: rectangular roofless walls ───
function makeStoneHouse(w, d, h, color) {
  const grp = new THREE.Group();
  const wall = stoneMat(color);
  // four walls (no roof — Inca buildings here were largely rooflines lost to time)
  const t = 0.35; // wall thickness
  // front and back
  for (const z of [-d/2, d/2]) {
    const wgeo = new THREE.BoxGeometry(w, h, t);
    const m = new THREE.Mesh(wgeo, wall);
    m.position.set(0, h/2, z);
    grp.add(m);
  }
  // left and right
  for (const x of [-w/2, w/2]) {
    const wgeo = new THREE.BoxGeometry(t, h, d);
    const m = new THREE.Mesh(wgeo, wall);
    m.position.set(x, h/2, 0);
    grp.add(m);
  }
  return grp;
}

function placeStructure(g, x, z, rot, scale) {
  g.position.set(x, terrYStart + 6 * 1.8 + 2.4, z);
  g.rotation.y = rot;
  g.scale.setScalar(scale || 1);
  citadel.add(g);
}

// Cluster of small Inca dwellings on the plateau
placeStructure(makeStoneHouse(2.6, 1.8, 1.4, 0xb09a78), -3.2, -1.4, 0.15, 1);
placeStructure(makeStoneHouse(2.2, 2.2, 1.5, 0xa89377), -1.0, -2.4, -0.05, 1);
placeStructure(makeStoneHouse(3.0, 1.6, 1.3, 0xb59f7c), 1.4, -2.0, 0.2, 1);
placeStructure(makeStoneHouse(2.4, 2.0, 1.6, 0xae9879), 3.5, -0.6, -0.1, 1);
placeStructure(makeStoneHouse(2.8, 1.8, 1.5, 0xb39a76), 0.5, 1.6, 0.3, 1);
placeStructure(makeStoneHouse(2.0, 2.4, 1.4, 0xa9947a), -2.2, 2.0, -0.2, 1);
placeStructure(makeStoneHouse(2.6, 1.6, 1.3, 0xae9573), 2.6, 2.2, 0.05, 1);

// Intihuatana — the small ceremonial stone marker at the highest point
const inti = new THREE.Group();
const intiBase = new THREE.Mesh(
  new THREE.BoxGeometry(0.9, 0.5, 0.9),
  stoneMat(0x5a4633)
);
intiBase.position.y = 0.25;
inti.add(intiBase);
const intiTop = new THREE.Mesh(
  new THREE.BoxGeometry(0.4, 0.7, 0.4),
  stoneMat(0x6b5440)
);
intiTop.position.y = 0.85;
inti.add(intiTop);
inti.position.set(0, terrYStart + 6 * 1.8 + 2.4, 0);
citadel.add(inti);

// ─── Distant valley floor + river suggestion (just a darker plane) ───
const valleyGeo = new THREE.PlaneGeometry(800, 800, 1, 1);
const valley = new THREE.Mesh(valleyGeo, stoneMat(0x382819));
valley.rotation.x = -Math.PI / 2;
valley.position.y = -16;
scene.add(valley);

// ─── Cloud bands drifting through the valley (mist between peaks) ───
const clouds = [];
function makeCloud(x, y, z, size) {
  const grp = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xead4b8, transparent: true, opacity: 0.32 });
  for (let i = 0; i < 5; i++) {
    const r = size * (0.6 + Math.random() * 0.8);
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 4), mat);
    m.position.set(
      (Math.random() - 0.5) * size * 2.5,
      (Math.random() - 0.5) * size * 0.6,
      (Math.random() - 0.5) * size * 1.4,
    );
    grp.add(m);
  }
  grp.position.set(x, y, z);
  return grp;
}

for (let i = 0; i < 9; i++) {
  const c = makeCloud(
    (Math.random() - 0.5) * 130,
    -3 + Math.random() * 4,
    -20 - Math.random() * 80,
    3 + Math.random() * 3,
  );
  clouds.push({ obj: c, drift: 0.04 + Math.random() * 0.04, baseX: c.position.x });
  scene.add(c);
}

// ─── Camera animation: slow orbit ───
let t = 0;
function animate() {
  t += 0.0035;
  camera.position.x = Math.sin(t) * 42;
  camera.position.z = Math.cos(t) * 42 + 18;
  camera.position.y = 22 + Math.sin(t * 0.6) * 4;
  camera.lookAt(0, 8, 0);

  // drift clouds
  for (const c of clouds) {
    c.obj.position.x += c.drift;
    if (c.obj.position.x > 80) c.obj.position.x = -80;
  }

  // sun disc tracks the camera so it stays in view
  sunDisc.lookAt(camera.position);
  halo.lookAt(camera.position);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
