<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Santorini Cliffside</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#7ab4d6; height:100%; }
  canvas { display:block; }
  .lbl {
    position:fixed; left:14px; bottom:12px;
    font-family: ui-monospace, "DM Mono", monospace; font-size:10px;
    letter-spacing:0.16em; text-transform:uppercase;
    color:rgba(255,255,255,0.7); pointer-events:none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="lbl">Santorini · cliffside village in afternoon light</div>
<script>
'use strict';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xb4d4e8, 0.008);
scene.background = new THREE.Color(0x88bce0);

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.5, 600);
camera.position.set(40, 18, 40);
camera.lookAt(0, 8, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Mediterranean afternoon: bright warm sun
scene.add(new THREE.AmbientLight(0xfff8e8, 0.7));
const sun = new THREE.DirectionalLight(0xfff0c8, 1.5);
sun.position.set(40, 50, 30);
scene.add(sun);

// Aegean Sea (bottom of frame, deep blue reflective plane)
const sea = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ color: 0x2a78b8, roughness: 0.3, metalness: 0.4 })
);
sea.rotation.x = -Math.PI/2;
sea.position.y = -8;
scene.add(sea);

// Cliff face — wedge of rough rock
const cliffMat = new THREE.MeshStandardMaterial({
  color: 0xa48060, roughness: 0.95, flatShading: true,
});
const cliffGeo = new THREE.BoxGeometry(60, 14, 30);
const cpos = cliffGeo.attributes.position;
for (let i = 0; i < cpos.count; i++) {
  const x = cpos.getX(i), y = cpos.getY(i), z = cpos.getZ(i);
  if (y < 6) {
    cpos.setX(i, x + (Math.sin(i*1.7)+Math.cos(i*2.3))*0.6);
    cpos.setZ(i, z + (Math.sin(i*2.1))*0.6);
  }
}
cliffGeo.computeVertexNormals();
const cliff = new THREE.Mesh(cliffGeo, cliffMat);
cliff.position.set(0, -1, -5);
scene.add(cliff);

// Cliff top plateau
const plateau = new THREE.Mesh(
  new THREE.BoxGeometry(50, 0.6, 20),
  new THREE.MeshStandardMaterial({ color: 0xc8b890, roughness: 0.9, flatShading: true })
);
plateau.position.set(0, 6.3, -5);
scene.add(plateau);

// Houses — white cubic with blue domes, scattered along the cliff edge
const whiteMat = new THREE.MeshStandardMaterial({ color: 0xfafaf3, roughness: 0.9 });
const blueMat  = new THREE.MeshStandardMaterial({ color: 0x2a8ad4, roughness: 0.6 });
const accentBlueMat = new THREE.MeshStandardMaterial({ color: 0x3098e0, roughness: 0.6 });
const woodMat  = new THREE.MeshStandardMaterial({ color: 0x6a4a30, roughness: 0.95 });

function makeHouse(x, z, w, d, h, hasDome) {
  const grp = new THREE.Group();
  // Cubic body
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), whiteMat);
  body.position.y = h/2;
  grp.add(body);

  if (hasDome) {
    // Blue dome
    const dome = new THREE.Mesh(
      new THREE.SphereGeometry(Math.min(w, d) * 0.45, 12, 8, 0, Math.PI*2, 0, Math.PI/2),
      blueMat
    );
    dome.position.y = h + 0.05;
    grp.add(dome);
    // Tiny cross
    const cross = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.4, 0.08),
      woodMat
    );
    cross.position.y = h + Math.min(w, d)*0.45 + 0.2;
    grp.add(cross);
  }

  // Door (small dark rectangle on front face)
  const door = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 1), woodMat);
  door.position.set(0, 0.5, d/2 + 0.01);
  grp.add(door);

  // Window (small blue square on side)
  const win = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.4), accentBlueMat);
  win.position.set(w/2 + 0.01, h*0.6, 0);
  win.rotation.y = Math.PI/2;
  grp.add(win);

  grp.position.set(x, 6.6, z);
  return grp;
}

// Place ~22 houses along the cliff edge with some dome variety
for (let i = 0; i < 22; i++) {
  const x = -22 + i * 2.0 + (Math.random()-0.5) * 0.6;
  const z = 4 - Math.random() * 6;
  const w = 1.4 + Math.random() * 0.8;
  const d = 1.4 + Math.random() * 0.8;
  const h = 1.4 + Math.random() * 1.2;
  const hasDome = Math.random() < 0.32;
  scene.add(makeHouse(x, z, w, d, h, hasDome));
}
// A second row stepped down toward the sea
for (let i = 0; i < 14; i++) {
  const x = -16 + i * 2.4 + (Math.random()-0.5) * 0.6;
  const z = 8 + Math.random() * 2;
  const w = 1.4 + Math.random() * 0.8;
  const d = 1.4 + Math.random() * 0.8;
  const h = 1.2 + Math.random() * 1.0;
  const hasDome = Math.random() < 0.18;
  const house = makeHouse(x, z, w, d, h, hasDome);
  house.position.y = 5.0; // stepped down
  scene.add(house);
}

// Bell tower (one prominent tall white tower with blue roof)
const towerGrp = new THREE.Group();
const towerBody = new THREE.Mesh(
  new THREE.BoxGeometry(2, 5, 2), whiteMat
);
towerBody.position.y = 2.5;
towerGrp.add(towerBody);
const towerArch = new THREE.Mesh(
  new THREE.BoxGeometry(2.4, 1.4, 2.4), whiteMat
);
towerArch.position.y = 5.5;
towerGrp.add(towerArch);
const towerDome = new THREE.Mesh(
  new THREE.SphereGeometry(1.0, 12, 8, 0, Math.PI*2, 0, Math.PI/2),
  blueMat
);
towerDome.position.y = 6.2;
towerGrp.add(towerDome);
const bell = new THREE.Mesh(
  new THREE.SphereGeometry(0.3, 8, 6),
  woodMat
);
bell.position.y = 5.5;
towerGrp.add(bell);
towerGrp.position.set(2, 6.6, -1);
scene.add(towerGrp);

// Bougainvillea splashes — small magenta cubes sprinkled around
for (let i = 0; i < 12; i++) {
  const flower = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.3, 0.4),
    new THREE.MeshStandardMaterial({ color: 0xff5a8a, roughness: 0.8 })
  );
  flower.position.set(
    -22 + Math.random() * 44,
    7 + Math.random() * 0.3,
    2 + Math.random() * 5
  );
  scene.add(flower);
}

// A few drifting wisps of cloud
const clouds = [];
for (let i = 0; i < 5; i++) {
  const c = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.45 });
  for (let j = 0; j < 4; j++) {
    const r = 1 + Math.random() * 1.5;
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 4), mat);
    m.position.set((Math.random()-0.5)*5, (Math.random()-0.5)*0.6, (Math.random()-0.5)*3);
    c.add(m);
  }
  c.position.set((Math.random()-0.5)*60, 22 + Math.random() * 6, -30 - Math.random() * 30);
  clouds.push({ obj: c, drift: 0.02 + Math.random() * 0.02 });
  scene.add(c);
}

// Animate slow orbit + cloud drift
let t = 0;
function animate() {
  t += 0.003;
  camera.position.x = Math.sin(t * 0.6) * 32 + 5;
  camera.position.z = Math.cos(t * 0.6) * 32 + 25;
  camera.position.y = 14 + Math.sin(t * 0.4) * 3;
  camera.lookAt(0, 7, 0);

  for (const c of clouds) {
    c.obj.position.x += c.drift;
    if (c.obj.position.x > 60) c.obj.position.x = -60;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
