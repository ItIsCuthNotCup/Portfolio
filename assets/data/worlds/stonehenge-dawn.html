<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stonehenge — Solstice Dawn</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0e0c08; height:100%; font-family: ui-monospace, "DM Mono", monospace; color:#e8dcc4; }
  canvas { display:block; }
  .lbl {
    position:fixed; left:14px; bottom:14px;
    font-size:10px; letter-spacing:0.16em; text-transform:uppercase;
    color:rgba(232,220,196,0.6); pointer-events:none;
  }
  .controls {
    position:fixed; top:14px; right:14px;
    background:rgba(20,16,10,0.78); backdrop-filter:blur(6px);
    border:1px solid rgba(232,220,196,0.18);
    padding:14px 16px; min-width:220px;
    font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
    color:#e8dcc4;
  }
  .controls h3 { margin:0 0 10px; font-size:9px; opacity:0.6; letter-spacing:0.18em; font-weight:400; }
  .ctrl { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
  .ctrl label { display:flex; justify-content:space-between; font-size:9px; opacity:0.7; }
  .ctrl label .v { opacity:1; font-variant-numeric:tabular-nums; }
  .ctrl input[type=range] { width:100%; accent-color:#e8a060; height:14px; }
  .toggle { display:flex; align-items:center; gap:8px; cursor:pointer; }
  .toggle input { accent-color:#e8a060; }
  .reset { display:block; width:100%; margin-top:6px; padding:6px 10px;
    background:transparent; color:#e8dcc4; border:1px solid rgba(232,220,196,0.3);
    font-family:inherit; font-size:9px; letter-spacing:0.16em; cursor:pointer;
    text-transform:uppercase;
  }
  .reset:hover { background:rgba(232,220,196,0.1); }
  .hint {
    position:fixed; left:14px; top:14px;
    font-size:9px; opacity:0.45; letter-spacing:0.14em; text-transform:uppercase;
    color:#e8dcc4; pointer-events:none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="lbl">Stonehenge · Salisbury Plain · solstice dawn</div>
<div class="hint">Drag to orbit · Scroll to zoom</div>
<div class="controls">
  <h3>Controls</h3>
  <div class="ctrl">
    <label>Sun azimuth <span class="v" id="vAz">52°</span></label>
    <input type="range" id="sunAz" min="0" max="360" value="52" step="1">
  </div>
  <div class="ctrl">
    <label>Sun elevation <span class="v" id="vEl">8°</span></label>
    <input type="range" id="sunEl" min="-5" max="60" value="8" step="1">
  </div>
  <div class="ctrl">
    <label>Wind <span class="v" id="vWind">0.5</span></label>
    <input type="range" id="wind" min="0" max="2" step="0.1" value="0.5">
  </div>
  <label class="toggle"><input type="checkbox" id="crowd"> Pilgrims at solstice</label>
  <button class="reset" id="reset">Reset to Avenue alignment</button>
</div>
<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// Renderer + scene + camera
// ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc4a886, 0.0075);
scene.background = new THREE.Color(0xa68258);

const camera = new THREE.PerspectiveCamera(54, innerWidth/innerHeight, 0.5, 2000);

// Avenue alignment — view from NE looking SW through trilithon arch
const DEFAULT_TARGET = new THREE.Vector3(0, 6, 0);
const DEFAULT_RADIUS = 48;
const DEFAULT_THETA  = -Math.PI * 0.5;  // facing south-southwest
const DEFAULT_PHI    = Math.PI * 0.42;
let target  = DEFAULT_TARGET.clone();
let radius  = DEFAULT_RADIUS;
let theta   = DEFAULT_THETA;
let phi     = DEFAULT_PHI;
function applyCamera() {
  const x = target.x + radius * Math.sin(phi) * Math.cos(theta);
  const z = target.z + radius * Math.sin(phi) * Math.sin(theta);
  const y = target.y + radius * Math.cos(phi);
  camera.position.set(x, y, z);
  camera.lookAt(target);
}
applyCamera();

// ─────────────────────────────────────────────────────────────
// Mouse + touch orbit / zoom (no OrbitControls — implemented inline)
// ─────────────────────────────────────────────────────────────
let dragging = false, lastX = 0, lastY = 0;
addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
addEventListener('mouseup',   () => { dragging = false; });
addEventListener('mouseleave',() => { dragging = false; });
addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  theta -= dx * 0.005;
  phi   -= dy * 0.004;
  phi = Math.max(0.18, Math.min(Math.PI * 0.49, phi));
  applyCamera();
});
addEventListener('wheel', e => {
  e.preventDefault();
  radius *= (1 + e.deltaY * 0.0015);
  radius = Math.max(15, Math.min(180, radius));
  applyCamera();
}, { passive: false });
// Touch
let touchLastX = 0, touchLastY = 0, touchLastDist = 0;
addEventListener('touchstart', e => {
  if (e.touches.length === 1) { touchLastX = e.touches[0].clientX; touchLastY = e.touches[0].clientY; }
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchLastDist = Math.hypot(dx, dy);
  }
}, { passive: true });
addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchLastX;
    const dy = e.touches[0].clientY - touchLastY;
    touchLastX = e.touches[0].clientX; touchLastY = e.touches[0].clientY;
    theta -= dx * 0.005; phi = Math.max(0.18, Math.min(Math.PI*0.49, phi - dy * 0.004));
    applyCamera();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    radius *= touchLastDist / Math.max(d, 1);
    radius = Math.max(15, Math.min(180, radius));
    touchLastDist = d;
    applyCamera();
  }
}, { passive: true });

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─────────────────────────────────────────────────────────────
// Lighting — sun (directional, casts shadows) + sky + ambient
// ─────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff0c4, 1.6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 220;
sun.shadow.camera.left   = -50;
sun.shadow.camera.right  = 50;
sun.shadow.camera.top    = 50;
sun.shadow.camera.bottom = -50;
sun.shadow.bias = -0.0006;
sun.shadow.normalBias = 0.05;
scene.add(sun);
scene.add(sun.target);

const hemi = new THREE.HemisphereLight(0xffe3b8, 0x4a3828, 0.7);
scene.add(hemi);

const ambient = new THREE.AmbientLight(0x4a3a28, 0.3);
scene.add(ambient);

// Sun visual
const sunDisc = new THREE.Mesh(
  new THREE.CircleGeometry(8, 64),
  new THREE.MeshBasicMaterial({ color: 0xffd9a0, transparent: true, opacity: 0.95 })
);
scene.add(sunDisc);
const halo = new THREE.Mesh(
  new THREE.CircleGeometry(20, 48),
  new THREE.MeshBasicMaterial({ color: 0xff9c5a, transparent: true, opacity: 0.22 })
);
scene.add(halo);

let sunAzDeg = 52;   // NE = solstice sunrise direction
let sunElDeg = 8;
function updateSunPosition() {
  const az = sunAzDeg * Math.PI / 180;
  const el = sunElDeg * Math.PI / 180;
  // World convention: azimuth 0 = north, 90 = east
  const dist = 100;
  const x = Math.sin(az) * Math.cos(el) * dist;
  const z = -Math.cos(az) * Math.cos(el) * dist;
  const y = Math.sin(el) * dist;
  sun.position.set(x, y, z);
  sunDisc.position.set(x, y, z);
  halo.position.set(x, y, z);
  // Sun color shifts with elevation: redder near horizon, whiter higher
  const warmth = Math.max(0, 1 - sunElDeg / 30);
  sun.color.setHSL(0.08, 0.6, 0.55 + 0.1 * (1 - warmth));
  sunDisc.material.color.setHSL(0.08, 0.85, 0.55 + 0.1 * (1 - warmth));
  // Sky gradient adjusts
  const skyHue = 0.06 + warmth * 0.02;
  const skyL   = 0.55 - warmth * 0.20;
  scene.background.setHSL(skyHue, 0.55, skyL);
  scene.fog.color.copy(scene.background);
}
updateSunPosition();

// Sun face camera always
function faceCamera(obj) { obj.lookAt(camera.position); }

// ─────────────────────────────────────────────────────────────
// Chalky terrain — heightfield with chalk patches
// ─────────────────────────────────────────────────────────────
const TERRAIN_SIZE = 600;
const TERRAIN_SEGS = 120;
const terrainGeo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS, TERRAIN_SEGS);
const tpos = terrainGeo.attributes.position;
// Vertex colors: green grass with chalk patches
const tcol = new Float32Array(tpos.count * 3);
function fbm(x, z) {
  // cheap fbm
  let v = 0, amp = 1, freq = 1;
  for (let o = 0; o < 4; o++) {
    v += amp * (Math.sin(x * freq * 0.5) * Math.cos(z * freq * 0.7) +
                Math.sin(x * freq * 0.31 + 1.7) * Math.cos(z * freq * 0.43));
    amp *= 0.5; freq *= 2;
  }
  return v;
}
for (let i = 0; i < tpos.count; i++) {
  const x = tpos.getX(i), y = tpos.getY(i);
  const dist = Math.sqrt(x*x + y*y);
  // Keep central plain flat (where the henge sits)
  const flatness = Math.max(0, Math.min(1, (dist - 25) / 35));
  const h = fbm(x * 0.04, y * 0.04) * 0.5 * flatness;
  tpos.setZ(i, h);
  // chalk vs grass: more chalk near patches, more green elsewhere
  const chalk = Math.max(0, fbm(x * 0.06 + 100, y * 0.06 - 50)) * 0.5 + 0.3;
  const isChalk = chalk > 0.5 && Math.random() < 0.4;
  let r, g, b;
  if (isChalk) {
    r = 0.78; g = 0.74; b = 0.65;
  } else {
    const variation = Math.random() * 0.1;
    r = 0.36 + variation;
    g = 0.40 + variation;
    b = 0.20 + variation * 0.5;
  }
  tcol[i*3]   = r;
  tcol[i*3+1] = g;
  tcol[i*3+2] = b;
}
terrainGeo.setAttribute('color', new THREE.BufferAttribute(tcol, 3));
terrainGeo.computeVertexNormals();
const terrain = new THREE.Mesh(
  terrainGeo,
  new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.95, metalness: 0,
    flatShading: false,
  })
);
terrain.rotation.x = -Math.PI/2;
terrain.receiveShadow = true;
scene.add(terrain);

// ─────────────────────────────────────────────────────────────
// Stones — sarsens and bluestones, with lichen-tinted variation
// ─────────────────────────────────────────────────────────────
function makeStoneGeo(w, h, d, weather = 0.12) {
  const geo = new THREE.BoxGeometry(w, h, d, 2, 4, 2);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setX(i, pos.getX(i) + (Math.sin(i*1.3)+Math.cos(i*2.1))*weather);
    pos.setY(i, pos.getY(i) + Math.sin(i*1.7)*weather*0.5);
    pos.setZ(i, pos.getZ(i) + (Math.sin(i*2.7))*weather);
  }
  geo.computeVertexNormals();
  return geo;
}

function makeStoneMat(baseGray, lichenAmount = 0.0) {
  // Per-stone vertex colors with lichen patches
  const c = new THREE.Color(baseGray);
  return new THREE.MeshStandardMaterial({
    color: c,
    roughness: 0.96,
    metalness: 0.02,
    flatShading: true,
  });
}

// Apply lichen as small extra mesh patches on each stone
function addLichenToStone(stoneMesh, count = 4) {
  const lichenColors = [0xa8b870, 0x8a9c5a, 0xc8d090, 0x6a7a48];
  const stoneSize = stoneMesh.geometry.parameters || { width: 2.4, height: 9, depth: 1.6 };
  const w = stoneSize.width || 2.4, h = stoneSize.height || 9, d = stoneSize.depth || 1.6;
  for (let i = 0; i < count; i++) {
    const r = 0.15 + Math.random() * 0.25;
    const lichen = new THREE.Mesh(
      new THREE.SphereGeometry(r, 5, 4),
      new THREE.MeshStandardMaterial({
        color: lichenColors[Math.floor(Math.random() * lichenColors.length)],
        roughness: 0.95, flatShading: true,
      })
    );
    // Stick to a random face of the stone
    const face = Math.floor(Math.random() * 4);
    if (face === 0) lichen.position.set( w/2 + 0.05, (Math.random()-0.5) * h * 0.7, (Math.random()-0.5) * d * 0.7);
    if (face === 1) lichen.position.set(-w/2 - 0.05, (Math.random()-0.5) * h * 0.7, (Math.random()-0.5) * d * 0.7);
    if (face === 2) lichen.position.set((Math.random()-0.5) * w * 0.7, (Math.random()-0.5) * h * 0.7,  d/2 + 0.05);
    if (face === 3) lichen.position.set((Math.random()-0.5) * w * 0.7, (Math.random()-0.5) * h * 0.7, -d/2 - 0.05);
    lichen.scale.y = 0.4 + Math.random() * 0.5;
    stoneMesh.add(lichen);
  }
}

function placeStone(geo, color, x, y, z, rot, fallenRot = null) {
  const mesh = new THREE.Mesh(geo, makeStoneMat(color));
  mesh.position.set(x, y, z);
  mesh.rotation.y = rot;
  if (fallenRot) {
    mesh.rotation.x = fallenRot.x || 0;
    mesh.rotation.z = fallenRot.z || 0;
  }
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  if (Math.random() < 0.7) addLichenToStone(mesh, 2 + Math.floor(Math.random() * 4));
  scene.add(mesh);
  return mesh;
}

// ─── Outer sarsen circle — 30 stones, some fallen ───
const sarsenGeo = makeStoneGeo(2.4, 9, 1.6);
const ringR = 17;
const N = 30;
const fallenIdx = new Set([3, 7, 11, 15, 19, 23, 27]);
const missingIdx = new Set([5, 14, 21]);
for (let i = 0; i < N; i++) {
  if (missingIdx.has(i)) continue;
  const a = (i / N) * Math.PI * 2;
  if (fallenIdx.has(i)) {
    placeStone(sarsenGeo, 0x726c63 + Math.floor(Math.random() * 0x080606), Math.cos(a) * (ringR-1), 0.8, Math.sin(a) * (ringR-1), -a + 0.3, { x: Math.PI/2, z: (Math.random()-0.5)*0.2 });
  } else {
    placeStone(sarsenGeo, 0x726c63 + Math.floor(Math.random() * 0x080606), Math.cos(a) * ringR, 4.5, Math.sin(a) * ringR, -a, { x: (Math.random()-0.5)*0.05, z: (Math.random()-0.5)*0.04 });
  }
}

// ─── Lintels on intact sarsen pairs ───
const lintelGeo = makeStoneGeo(3.4, 0.9, 1.4, 0.08);
for (let i = 0; i < N; i++) {
  const i2 = (i + 1) % N;
  if (fallenIdx.has(i) || fallenIdx.has(i2) || missingIdx.has(i) || missingIdx.has(i2)) continue;
  if (Math.random() < 0.3) continue;
  const a1 = (i / N) * Math.PI * 2;
  const a2 = (i2 / N) * Math.PI * 2;
  const aMid = (a1 + a2) / 2;
  placeStone(lintelGeo, 0x6d6760, Math.cos(aMid) * ringR, 9.4, Math.sin(aMid) * ringR, -aMid);
}

// ─── Inner trilithon horseshoe — 5 trilithons opening NE ───
const innerR = 7.5;
const tallGeo = makeStoneGeo(2.4, 11, 1.7);
const trilithonAngles = [-2, -1, 0, 1, 2];
for (const idx of trilithonAngles) {
  const baseA = -Math.PI/2 + idx * (Math.PI / 6);
  const offsetA = 0.13;
  const a1 = baseA - offsetA;
  const a2 = baseA + offsetA;
  placeStone(tallGeo, 0x6d6760 + Math.floor(Math.random()*0x080606), Math.cos(a1) * innerR, 5.5, Math.sin(a1) * innerR, -a1);
  placeStone(tallGeo, 0x6d6760 + Math.floor(Math.random()*0x080606), Math.cos(a2) * innerR, 5.5, Math.sin(a2) * innerR, -a2);
  if (idx !== -2 && idx !== 2 && Math.random() < 0.7) {
    const aMid = (a1 + a2) / 2;
    const tlGeo = makeStoneGeo(3.6, 1.0, 1.5, 0.08);
    placeStone(tlGeo, 0x6d6760, Math.cos(aMid) * innerR, 11.4, Math.sin(aMid) * innerR, -aMid);
  }
}

// ─── Bluestones inside the trilithons — smaller, blue-gray ───
const blueGeo = makeStoneGeo(0.9, 4.2, 0.7, 0.06);
for (let i = 0; i < 19; i++) {
  const a = (i / 19) * Math.PI * 2;
  if (Math.random() < 0.2) continue;
  placeStone(blueGeo, 0x4a5660 + Math.floor(Math.random()*0x080606), Math.cos(a)*5.2, 2.1, Math.sin(a)*5.2, -a);
}

// ─── Heel Stone (NE, marks summer solstice direction) ───
placeStone(makeStoneGeo(2.6, 7, 1.8, 0.18), 0x6e6862, 0, 3.5, -32, 0.18, { x: -0.12 });

// ─── Slaughter Stone (fallen at entrance) ───
placeStone(makeStoneGeo(2.4, 7, 1.6, 0.18), 0x6e6862, -3, 0.7, -25, 0, { x: Math.PI/2, z: 0.1 });

// ─── Altar Stone (lying flat at center) ───
placeStone(makeStoneGeo(3.2, 0.5, 1.4, 0.08), 0x9a8e7a, 0, 0.25, -1, 0.1);

// ─────────────────────────────────────────────────────────────
// Instanced grass — performance-conscious (no per-blade mesh)
// ─────────────────────────────────────────────────────────────
const GRASS_COUNT = 8000;
const grassGeo = new THREE.PlaneGeometry(0.05, 0.6, 1, 2);
grassGeo.translate(0, 0.3, 0); // root at base
const grassMat = new THREE.MeshStandardMaterial({
  color: 0x6a7240, side: THREE.DoubleSide, roughness: 1.0, flatShading: true,
});
const grass = new THREE.InstancedMesh(grassGeo, grassMat, GRASS_COUNT);
const grassMatrix = new THREE.Matrix4();
const grassDummy = new THREE.Object3D();
const grassData = []; // { x, z, baseRotY, scale, phase }
for (let i = 0; i < GRASS_COUNT; i++) {
  // distribute in a 200m radius around the henge but exclude inner ~14m
  let x, z, dist;
  do {
    x = (Math.random() - 0.5) * 200;
    z = (Math.random() - 0.5) * 200;
    dist = Math.sqrt(x*x + z*z);
  } while (dist < 14);
  const baseRotY = Math.random() * Math.PI;
  const scale = 0.7 + Math.random() * 0.6;
  grassDummy.position.set(x, 0, z);
  grassDummy.rotation.y = baseRotY;
  grassDummy.scale.setScalar(scale);
  grassDummy.updateMatrix();
  grass.setMatrixAt(i, grassDummy.matrix);
  grassData.push({ x, z, baseRotY, scale, phase: Math.random() * 6.28 });
}
grass.instanceMatrix.needsUpdate = true;
grass.castShadow = false;
grass.receiveShadow = true;
scene.add(grass);

// ─────────────────────────────────────────────────────────────
// Burial barrows — round mounds at distance
// ─────────────────────────────────────────────────────────────
function makeBarrow(x, z, r, h) {
  const geo = new THREE.SphereGeometry(r, 16, 8, 0, Math.PI*2, 0, Math.PI/2);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x787240, roughness: 0.95, flatShading: true,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, 0, z);
  m.scale.y = h / r;
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}
const barrowSpots = [
  [-45, -15, 3.5, 1.8], [-55, 10, 3.0, 1.5], [40, -20, 4.0, 2.0],
  [50, 8, 3.2, 1.6], [-30, -55, 4.5, 2.2], [35, -50, 3.8, 1.9],
  [-72, -42, 3.4, 1.7], [62, 35, 3.1, 1.6], [-12, 60, 3.6, 1.8],
];
barrowSpots.forEach(s => scene.add(makeBarrow(...s)));

// Distant horizon hills
function makeHill(x, z, w, h) {
  const geo = new THREE.SphereGeometry(w, 16, 8, 0, Math.PI*2, 0, Math.PI/2);
  const mat = new THREE.MeshStandardMaterial({ color: 0x4a4530, roughness: 0.95, flatShading: true });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, 0, z);
  m.scale.y = h / w;
  return m;
}
[[-80,-110,30,8],[0,-150,50,12],[90,-120,35,9],[-130,-90,25,7],[140,-100,28,8],[-180,-50,26,7],[170,30,28,8]].forEach(c => scene.add(makeHill(...c)));

// ─────────────────────────────────────────────────────────────
// Low fences (ground markers around the periphery)
// ─────────────────────────────────────────────────────────────
const fenceMat = new THREE.MeshStandardMaterial({ color: 0x4a3826, roughness: 0.9 });
const fenceR = 28;
for (let i = 0; i < 36; i++) {
  const a = (i / 36) * Math.PI * 2;
  // Skip a section near the entrance/avenue
  if (a > Math.PI * 0.3 && a < Math.PI * 0.5) continue;
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.7, 0.15), fenceMat);
  post.position.set(Math.cos(a) * fenceR, 0.35, Math.sin(a) * fenceR);
  post.castShadow = true;
  scene.add(post);
}

// ─────────────────────────────────────────────────────────────
// Crowd — instanced low-poly silhouettes (toggleable)
// ─────────────────────────────────────────────────────────────
const CROWD_COUNT = 60;
const crowdGroup = new THREE.Group();
crowdGroup.visible = false;
// Use a single tall tetrahedron-ish silhouette per pilgrim
const personGeo = new THREE.ConeGeometry(0.35, 1.6, 4);
personGeo.translate(0, 0.8, 0);
const personMat = new THREE.MeshStandardMaterial({
  color: 0x2a1a14, roughness: 0.95, flatShading: true,
});
const crowd = new THREE.InstancedMesh(personGeo, personMat, CROWD_COUNT);
const crowdData = [];
for (let i = 0; i < CROWD_COUNT; i++) {
  // Cluster in a quarter-arc to the NE (facing the sunrise alignment)
  const a = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 0.6;
  const r = 23 + Math.random() * 8;
  const x = Math.cos(a) * r + (Math.random()-0.5) * 2;
  const z = Math.sin(a) * r + (Math.random()-0.5) * 2;
  const scale = 0.85 + Math.random() * 0.3;
  grassDummy.position.set(x, 0, z);
  grassDummy.rotation.y = -a + Math.PI/2 + (Math.random()-0.5) * 0.4;
  grassDummy.scale.setScalar(scale);
  grassDummy.updateMatrix();
  crowd.setMatrixAt(i, grassDummy.matrix);
  crowdData.push({ x, z, baseRotY: grassDummy.rotation.y, scale });
}
crowd.instanceMatrix.needsUpdate = true;
crowd.castShadow = true;
crowdGroup.add(crowd);
scene.add(crowdGroup);

// ─────────────────────────────────────────────────────────────
// Mist drifting through the plain
// ─────────────────────────────────────────────────────────────
const mistLayers = [];
for (let i = 0; i < 10; i++) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(180, 22, 1, 1),
    new THREE.MeshBasicMaterial({
      color: 0xd8c4a6, transparent: true, opacity: 0.14, side: THREE.DoubleSide,
    })
  );
  m.position.set((Math.random()-0.5)*60, 0.6 + i * 0.35, -10 - Math.random()*40);
  m.rotation.y = (Math.random()-0.5) * 0.4;
  mistLayers.push({ obj: m, drift: 0.018 + Math.random()*0.022 });
  scene.add(m);
}

// ─────────────────────────────────────────────────────────────
// UI hookup
// ─────────────────────────────────────────────────────────────
const elAz   = document.getElementById('sunAz');
const elEl   = document.getElementById('sunEl');
const elWind = document.getElementById('wind');
const elCrowd= document.getElementById('crowd');
const vAz    = document.getElementById('vAz');
const vEl    = document.getElementById('vEl');
const vWind  = document.getElementById('vWind');
let windAmt  = 0.5;
elAz.oninput   = () => { sunAzDeg = parseFloat(elAz.value); vAz.textContent = sunAzDeg + '°'; updateSunPosition(); };
elEl.oninput   = () => { sunElDeg = parseFloat(elEl.value); vEl.textContent = sunElDeg + '°'; updateSunPosition(); };
elWind.oninput = () => { windAmt  = parseFloat(elWind.value); vWind.textContent = windAmt.toFixed(1); };
elCrowd.onchange = () => { crowdGroup.visible = elCrowd.checked; };
document.getElementById('reset').onclick = () => {
  target.copy(DEFAULT_TARGET); radius = DEFAULT_RADIUS;
  theta = DEFAULT_THETA; phi = DEFAULT_PHI;
  applyCamera();
};

// ─────────────────────────────────────────────────────────────
// Animation
// ─────────────────────────────────────────────────────────────
const grassAnimDummy = new THREE.Object3D();
let t = 0;
function animate() {
  t += 0.012;

  // Sun direction follows where we put it; aim the directional light at origin
  sun.target.position.set(0, 0, 0);

  // Sun visuals always face camera
  faceCamera(sunDisc);
  faceCamera(halo);

  // Mist drift
  for (const m of mistLayers) {
    m.obj.position.x += m.drift;
    if (m.obj.position.x > 70) m.obj.position.x = -70;
  }

  // Grass sway — only update a subset per frame for perf (instanced sway)
  if (windAmt > 0.01) {
    const step = 8; // update 1/8 of grass per frame
    const phaseOffset = (t * 60) | 0;
    for (let i = phaseOffset % step; i < GRASS_COUNT; i += step) {
      const g = grassData[i];
      const sway = Math.sin(t * 2 + g.phase + g.x * 0.1) * 0.18 * windAmt;
      grassAnimDummy.position.set(g.x, 0, g.z);
      grassAnimDummy.rotation.set(0, g.baseRotY, sway);
      grassAnimDummy.scale.setScalar(g.scale);
      grassAnimDummy.updateMatrix();
      grass.setMatrixAt(i, grassAnimDummy.matrix);
    }
    grass.instanceMatrix.needsUpdate = true;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
