<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stonehenge at Dawn</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#1c1812; height:100%; }
  canvas { display:block; }
  .lbl {
    position:fixed; left:14px; bottom:12px;
    font-family: ui-monospace, "DM Mono", monospace; font-size:10px;
    letter-spacing:0.16em; text-transform:uppercase;
    color:rgba(245,235,210,0.55); pointer-events:none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="lbl">Stonehenge · solstice dawn</div>
<script>
'use strict';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc4a886, 0.018);
scene.background = new THREE.Color(0x9a7b5a);

const camera = new THREE.PerspectiveCamera(56, innerWidth/innerHeight, 0.5, 600);
camera.position.set(0, 18, 50);
camera.lookAt(0, 6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Pre-dawn light: low warm sun + cool ambient
scene.add(new THREE.AmbientLight(0x6a5a48, 0.6));
const sun = new THREE.DirectionalLight(0xffc880, 1.6);
sun.position.set(0, 6, -50); // sun rising on horizon, behind the ring
scene.add(sun);

// Sun disc — large, soft, low on horizon
const sunDisc = new THREE.Mesh(
  new THREE.CircleGeometry(7, 48),
  new THREE.MeshBasicMaterial({ color: 0xffd9a0, transparent: true, opacity: 0.9 })
);
sunDisc.position.set(0, 5, -100);
scene.add(sunDisc);
const halo = new THREE.Mesh(
  new THREE.CircleGeometry(14, 48),
  new THREE.MeshBasicMaterial({ color: 0xff9c5a, transparent: true, opacity: 0.18 })
);
halo.position.copy(sunDisc.position);
halo.position.z -= 1;
scene.add(halo);

// Salisbury plain — flat grass
const plain = new THREE.Mesh(
  new THREE.PlaneGeometry(800, 800),
  new THREE.MeshStandardMaterial({ color: 0x6a6a3f, roughness: 0.95, flatShading: true })
);
plain.rotation.x = -Math.PI/2;
scene.add(plain);

// Stones — bluestone texture (cool gray-blue, slightly rough)
function stoneMat() {
  return new THREE.MeshStandardMaterial({
    color: 0x6e6a62, roughness: 0.95, metalness: 0.05, flatShading: true,
  });
}

function makeStanding(w, h, d) {
  const geo = new THREE.BoxGeometry(w, h, d);
  // Wobble vertices for hand-cut look
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setX(i, pos.getX(i) + (Math.sin(i*1.3)+Math.cos(i*2.1))*0.08);
    pos.setZ(i, pos.getZ(i) + (Math.sin(i*2.7))*0.06);
  }
  geo.computeVertexNormals();
  return new THREE.Mesh(geo, stoneMat());
}

// Outer sarsen circle — 30 standing stones in a 17m radius ring
const ringR = 17;
const sarsens = new THREE.Group();
const N = 22; // visible (some collapsed in modern reality)
for (let i = 0; i < N; i++) {
  const a = (i / N) * Math.PI * 2;
  if (Math.random() < 0.18) continue; // a few "missing" / fallen
  const standing = makeStanding(2.4, 9, 1.6);
  standing.position.set(Math.cos(a)*ringR, 4.5, Math.sin(a)*ringR);
  standing.rotation.y = -a;
  sarsens.add(standing);
}
scene.add(sarsens);

// Lintels — horizontal stones on top of pairs
const lintels = new THREE.Group();
for (let i = 0; i < N; i++) {
  if (Math.random() < 0.55) continue; // partial reconstruction
  const a1 = (i / N) * Math.PI * 2;
  const a2 = ((i+1) % N / N) * Math.PI * 2;
  const aMid = (a1 + a2) / 2;
  const lintel = makeStanding(3.4, 0.9, 1.4);
  lintel.position.set(Math.cos(aMid)*ringR, 9.4, Math.sin(aMid)*ringR);
  lintel.rotation.y = -aMid;
  lintels.add(lintel);
}
scene.add(lintels);

// Inner trilithon horseshoe — 5 taller stones, opening toward sunrise
const trilithons = new THREE.Group();
const innerR = 7;
for (let i = -2; i <= 2; i++) {
  const a = -Math.PI/2 + (i / 5) * Math.PI;
  const tall = makeStanding(2.6, 11, 1.8);
  tall.position.set(Math.cos(a)*innerR, 5.5, Math.sin(a)*innerR);
  tall.rotation.y = -a;
  trilithons.add(tall);
}
scene.add(trilithons);

// Heel stone — outside the circle, marks the solstice direction
const heel = makeStanding(2.4, 7, 1.8);
heel.position.set(0, 3.5, -32);
heel.rotation.y = 0.18;
scene.add(heel);

// Mist on the plain — thin horizontal cloud layer
const mistLayers = [];
for (let i = 0; i < 5; i++) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(120, 20, 1, 1),
    new THREE.MeshBasicMaterial({
      color: 0xd8c4a6, transparent: true, opacity: 0.18, side: THREE.DoubleSide,
    })
  );
  m.position.set((Math.random()-0.5)*40, 1 + i * 0.6, -10 - Math.random()*30);
  m.rotation.y = (Math.random()-0.5) * 0.3;
  mistLayers.push({ obj: m, drift: 0.02 + Math.random()*0.02 });
  scene.add(m);
}

// Animate — slow orbit, mist drift, sun gentle rise
let t = 0;
function animate() {
  t += 0.003;
  camera.position.x = Math.sin(t * 0.7) * 38;
  camera.position.z = Math.cos(t * 0.7) * 38 + 12;
  camera.position.y = 14 + Math.sin(t * 0.4) * 4;
  camera.lookAt(0, 6, 0);

  for (const m of mistLayers) {
    m.obj.position.x += m.drift;
    if (m.obj.position.x > 60) m.obj.position.x = -60;
  }

  sunDisc.lookAt(camera.position);
  halo.lookAt(camera.position);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
