<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voxel Tokyo at Night</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0a0612; height:100%; }
  canvas { display:block; }
  .lbl {
    position:fixed; left:14px; bottom:12px;
    font-family: ui-monospace, "DM Mono", monospace; font-size:10px;
    letter-spacing:0.16em; text-transform:uppercase;
    color:rgba(220,210,255,0.45); pointer-events:none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="lbl">Voxel Tokyo · Shibuya at 2 AM</div>
<script>
'use strict';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0e1a, 0.013);
scene.background = new THREE.Color(0x05030f);

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.5, 800);
camera.position.set(40, 28, 70);
camera.lookAt(0, 8, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Cool moonlit ambient + magenta neon fill
scene.add(new THREE.AmbientLight(0x303060, 0.4));
const moon = new THREE.DirectionalLight(0x7a90c0, 0.5);
moon.position.set(-30, 60, 20);
scene.add(moon);

// Wet street plane (dark, reflective)
const street = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ color: 0x100a18, roughness: 0.4, metalness: 0.6 })
);
street.rotation.x = -Math.PI/2;
scene.add(street);

// Grid streets — bright lane markings between the building blocks
const streetMarkMat = new THREE.MeshBasicMaterial({ color: 0x3a3a4e, transparent: true, opacity: 0.6 });
const blockSize = 14;  // distance between street center lines
const streetWidth = 4;
for (let i = -3; i <= 3; i++) {
  // East-west streets
  const ew = new THREE.Mesh(
    new THREE.PlaneGeometry(120, streetWidth),
    streetMarkMat
  );
  ew.rotation.x = -Math.PI/2;
  ew.position.set(0, 0.02, i * blockSize);
  scene.add(ew);
  // North-south streets
  const ns = new THREE.Mesh(
    new THREE.PlaneGeometry(streetWidth, 120),
    streetMarkMat
  );
  ns.rotation.x = -Math.PI/2;
  ns.position.set(i * blockSize, 0.02, 0);
  scene.add(ns);
}

// ─────────────────────────────────────────────────────────────
// Buildings — placed in city blocks between the street grid
// ─────────────────────────────────────────────────────────────
const NEON_COLORS = [0xff3a8a, 0x4af0ff, 0xfff04a, 0x7a4aff, 0xff7a4a, 0x4affa0, 0xff5a3a, 0x7af0ff];

const blinkingSigns = [];

function makeBuilding(x, z, w, d, h, neon) {
  const grp = new THREE.Group();
  const concrete = new THREE.MeshStandardMaterial({
    color: 0x141220, roughness: 0.85, metalness: 0.1,
  });
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), concrete);
  body.position.y = h/2;
  grp.add(body);

  // Vertical neon strip (one face)
  const stripMat = new THREE.MeshBasicMaterial({ color: neon });
  const strip = new THREE.Mesh(
    new THREE.BoxGeometry(0.3, h*0.7, 0.05),
    stripMat
  );
  strip.position.set(w/2 + 0.03, h*0.4, d/4);
  grp.add(strip);

  // Window grid
  const winMat = new THREE.MeshBasicMaterial({ color: 0xffe8a0 });
  const offWinMat = new THREE.MeshBasicMaterial({ color: 0x1a1418 });
  const cols = Math.max(2, Math.floor(w/0.7));
  const rows = Math.max(3, Math.floor(h/0.9));
  for (let cx = 0; cx < cols; cx++) {
    for (let r = 0; r < rows; r++) {
      const lit = Math.random() < 0.55;
      const wm = new THREE.Mesh(
        new THREE.PlaneGeometry(0.3, 0.4),
        lit ? winMat : offWinMat
      );
      const px = -w/2 + 0.5 + cx * (w-1) / Math.max(1, cols-1);
      const py = 0.6 + r * 0.9;
      wm.position.set(px, py, d/2 + 0.001);
      grp.add(wm);
    }
  }

  // Optional blinking neon billboard sign on top of taller buildings
  if (h > 14 && Math.random() < 0.45) {
    const signColor = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
    const signMat = new THREE.MeshBasicMaterial({ color: signColor });
    const sign = new THREE.Mesh(
      new THREE.BoxGeometry(w * 0.9, 1.4, 0.3),
      signMat
    );
    sign.position.set(0, h + 0.7, d/2 - 0.1);
    grp.add(sign);
    blinkingSigns.push({
      mat: signMat,
      baseColor: signColor,
      phase: Math.random() * 6.28,
      speed: 1.5 + Math.random() * 4,
    });
  }

  // Rooftop antenna on some
  if (Math.random() < 0.3) {
    const antenna = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 2.5, 4),
      new THREE.MeshBasicMaterial({ color: 0x444444 })
    );
    antenna.position.set((Math.random()-0.5) * w * 0.6, h + 1.25, (Math.random()-0.5) * d * 0.6);
    grp.add(antenna);
    // Red blinking aviation light at top
    const aviationLight = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 6, 4),
      new THREE.MeshBasicMaterial({ color: 0xff2030 })
    );
    aviationLight.position.set(antenna.position.x, h + 2.5, antenna.position.z);
    grp.add(aviationLight);
    blinkingSigns.push({
      mat: aviationLight.material,
      baseColor: 0xff2030,
      phase: Math.random() * 6.28,
      speed: 4,
      asLight: true,
    });
  }

  grp.position.set(x, 0, z);
  return grp;
}

// Place buildings inside the blocks (between street lines), avoid central plaza
for (let bx = -3; bx <= 3; bx++) {
  for (let bz = -3; bz <= 3; bz++) {
    if (Math.abs(bx) < 1 && Math.abs(bz) < 1) continue; // central plaza
    const blockCx = bx * blockSize;
    const blockCz = bz * blockSize;
    // 1-3 buildings per block
    const buildings = 1 + Math.floor(Math.random() * 3);
    for (let b = 0; b < buildings; b++) {
      const w = 2 + Math.random() * 4;
      const d = 2 + Math.random() * 4;
      const h = 4 + Math.random() * 24;
      const x = blockCx + (Math.random()-0.5) * (blockSize - streetWidth - w);
      const z = blockCz + (Math.random()-0.5) * (blockSize - streetWidth - d);
      const neon = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
      scene.add(makeBuilding(x, z, w, d, h, neon));
    }
  }
}

// ─────────────────────────────────────────────────────────────
// Tokyo Tower-style landmark
// ─────────────────────────────────────────────────────────────
const towerGrp = new THREE.Group();
for (let i = 0; i < 4; i++) {
  const segH = 7;
  const segR = 2.8 - i * 0.5;
  const seg = new THREE.Mesh(
    new THREE.CylinderGeometry(segR * 0.7, segR, segH, 6),
    new THREE.MeshStandardMaterial({ color: 0xff6a4a, roughness: 0.6 })
  );
  seg.position.y = segH * (i + 0.5);
  towerGrp.add(seg);
}
const towerLight = new THREE.Mesh(
  new THREE.SphereGeometry(0.9, 8, 6),
  new THREE.MeshBasicMaterial({ color: 0xff3030 })
);
towerLight.position.y = 4 * 7 + 1;
towerGrp.add(towerLight);
towerGrp.position.set(0, 0, 0);
scene.add(towerGrp);

// ─────────────────────────────────────────────────────────────
// Cars — lit headlights/taillights moving along the street grid
// ─────────────────────────────────────────────────────────────
const cars = [];
function makeCar(headColor, tailColor) {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.4, 0.4, 0.6),
    new THREE.MeshStandardMaterial({ color: 0x1a1820, roughness: 0.6 })
  );
  body.position.y = 0.3;
  grp.add(body);
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.3, 0.55),
    new THREE.MeshBasicMaterial({ color: 0x0a0816 })
  );
  cabin.position.set(0, 0.65, 0);
  grp.add(cabin);
  // Headlights (front)
  const hL = new THREE.Mesh(
    new THREE.BoxGeometry(0.05, 0.1, 0.15),
    new THREE.MeshBasicMaterial({ color: headColor })
  );
  hL.position.set(0.7, 0.25, -0.2);
  grp.add(hL);
  const hR = hL.clone();
  hR.position.z = 0.2;
  grp.add(hR);
  // Taillights (back)
  const tL = new THREE.Mesh(
    new THREE.BoxGeometry(0.05, 0.1, 0.15),
    new THREE.MeshBasicMaterial({ color: tailColor })
  );
  tL.position.set(-0.7, 0.25, -0.2);
  grp.add(tL);
  const tR = tL.clone();
  tR.position.z = 0.2;
  grp.add(tR);
  return grp;
}

// Spawn cars on east-west streets
for (let lane = -3; lane <= 3; lane++) {
  if (lane === 0) continue;
  for (let i = 0; i < 4; i++) {
    const dir = lane > 0 ? 1 : -1;
    const car = makeCar(0xfff8e0, 0xff3030);
    car.position.set(
      -50 + i * 30 + Math.random() * 10,
      0,
      lane * blockSize + (dir > 0 ? 1 : -1)
    );
    car.rotation.y = dir > 0 ? 0 : Math.PI;
    cars.push({ obj: car, axis: 'x', dir, speed: 0.12 + Math.random() * 0.08 });
    scene.add(car);
  }
}
// Spawn cars on north-south streets
for (let lane = -3; lane <= 3; lane++) {
  if (lane === 0) continue;
  for (let i = 0; i < 4; i++) {
    const dir = lane > 0 ? 1 : -1;
    const car = makeCar(0xfff8e0, 0xff3030);
    car.position.set(
      lane * blockSize + (dir > 0 ? 1 : -1),
      0,
      -50 + i * 30 + Math.random() * 10
    );
    car.rotation.y = dir > 0 ? Math.PI/2 : -Math.PI/2;
    cars.push({ obj: car, axis: 'z', dir, speed: 0.12 + Math.random() * 0.08 });
    scene.add(car);
  }
}

// ─────────────────────────────────────────────────────────────
// Drifting neon-lit clouds
// ─────────────────────────────────────────────────────────────
const clouds = [];
function makeCloud() {
  const grp = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({
    color: 0xff5a9a, transparent: true, opacity: 0.16,
  });
  for (let i = 0; i < 5; i++) {
    const r = 4 + Math.random() * 3;
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 4), mat);
    m.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*1.5, (Math.random()-0.5)*4);
    grp.add(m);
  }
  return grp;
}
for (let i = 0; i < 8; i++) {
  const c = makeCloud();
  c.position.set((Math.random()-0.5)*140, 28 + Math.random() * 14, -30 - Math.random() * 80);
  clouds.push({ obj: c, drift: 0.04 + Math.random()*0.03 });
  scene.add(c);
}

// Helicopter with searchlight
const heliGrp = new THREE.Group();
const heliBody = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.5, 0.8),
  new THREE.MeshStandardMaterial({ color: 0x202028 })
);
heliGrp.add(heliBody);
const heliBlade = new THREE.Mesh(
  new THREE.BoxGeometry(4, 0.03, 0.15),
  new THREE.MeshBasicMaterial({ color: 0x444444 })
);
heliBlade.position.y = 0.4;
heliGrp.add(heliBlade);
const heliLight = new THREE.Mesh(
  new THREE.SphereGeometry(0.18, 6, 4),
  new THREE.MeshBasicMaterial({ color: 0xff3030 })
);
heliLight.position.x = -1.1;
heliGrp.add(heliLight);
heliGrp.position.set(20, 24, -10);
scene.add(heliGrp);

// ─────────────────────────────────────────────────────────────
// Animation
// ─────────────────────────────────────────────────────────────
let t = 0;
function animate() {
  t += 0.0035;
  camera.position.x = Math.sin(t) * 50;
  camera.position.z = Math.cos(t) * 50 + 25;
  camera.position.y = 24 + Math.sin(t * 0.5) * 6;
  camera.lookAt(0, 12, 0);

  // Cloud drift
  for (const c of clouds) {
    c.obj.position.x += c.drift;
    if (c.obj.position.x > 80) c.obj.position.x = -80;
  }

  // Tower light pulses
  towerLight.material.color.setHSL(0, 1, 0.5 + Math.sin(t * 4) * 0.15);

  // Cars drive along streets
  for (const car of cars) {
    if (car.axis === 'x') {
      car.obj.position.x += car.speed * car.dir;
      if (car.dir > 0 && car.obj.position.x > 60) car.obj.position.x = -60;
      if (car.dir < 0 && car.obj.position.x < -60) car.obj.position.x = 60;
    } else {
      car.obj.position.z += car.speed * car.dir;
      if (car.dir > 0 && car.obj.position.z > 60) car.obj.position.z = -60;
      if (car.dir < 0 && car.obj.position.z < -60) car.obj.position.z = 60;
    }
  }

  // Blinking neon signs + aviation lights
  for (const s of blinkingSigns) {
    if (s.asLight) {
      // Aviation lights — sharp on/off blink
      const on = (Math.sin(t * s.speed + s.phase) > 0.7) ? 1 : 0.1;
      s.mat.color.setHex(s.baseColor);
      s.mat.color.multiplyScalar(on);
    } else {
      // Neon signs — gentle flicker
      const flicker = 0.7 + 0.3 * Math.sin(t * s.speed + s.phase);
      const c = new THREE.Color(s.baseColor);
      c.multiplyScalar(flicker);
      s.mat.color.copy(c);
    }
  }

  // Helicopter circles slowly
  heliGrp.position.x = Math.cos(t * 0.4) * 28;
  heliGrp.position.z = Math.sin(t * 0.4) * 28 - 10;
  heliGrp.position.y = 26 + Math.sin(t * 0.8) * 1.5;
  heliGrp.rotation.y = -t * 0.4 + Math.PI/2;
  heliBlade.rotation.y += 0.6;
  // Blink helicopter light
  heliLight.material.color.setHex(Math.sin(t * 5) > 0 ? 0xff3030 : 0x200808);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
